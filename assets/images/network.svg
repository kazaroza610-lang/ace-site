<svg width="520" height="400" viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Réseau d'air comprimé">
  <defs>
    <linearGradient id="nbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A3A6B"/>
      <stop offset="1" stop-color="#0D1F3C"/>
    </linearGradient>
  </defs>
  <rect width="520" height="400" rx="16" fill="url(#nbg)"/>

  <!-- Tuyauterie réseau -->
  <g stroke="#E8EDF4" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M70 90h300a30 30 0 0 1 30 30v60"/>
    <path d="M70 90v220"/>
    <path d="M70 200h160"/>
    <path d="M70 310h300"/>
    <path d="M230 200v110"/>
  </g>
  <!-- Reflets tuyaux -->
  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M70 86h300"/>
    <path d="M66 90v220"/>
  </g>

  <!-- Vannes (jonctions orange) -->
  <g fill="#2563EB">
    <circle cx="70" cy="90" r="14"/>
    <circle cx="230" cy="200" r="14"/>
    <circle cx="70" cy="310" r="14"/>
    <circle cx="370" cy="310" r="14"/>
  </g>
  <g fill="#0D1F3C">
    <circle cx="70" cy="90" r="6"/>
    <circle cx="230" cy="200" r="6"/>
    <circle cx="70" cy="310" r="6"/>
    <circle cx="370" cy="310" r="6"/>
  </g>

  <!-- Point de sortie / outil pneumatique -->
  <g transform="translate(400,180)">
    <rect x="-18" y="0" width="36" height="60" rx="8" fill="#E8EDF4"/>
    <rect x="-10" y="60" width="20" height="34" rx="6" fill="#4A5568"/>
    <g stroke="#60A5FA" stroke-width="4" stroke-linecap="round">
      <path d="M22 30h26"/>
      <path d="M22 18h16"/>
      <path d="M22 42h16"/>
    </g>
  </g>

  <!-- Compresseur source -->
  <g transform="translate(95,200)">
    <rect x="0" y="-30" width="110" height="80" rx="12" fill="#2563EB"/>
    <rect x="14" y="-14" width="40" height="30" rx="5" fill="#0D1F3C"/>
    <circle cx="26" cy="1" r="5" fill="#52d869"/>
    <circle cx="44" cy="1" r="5" fill="#60A5FA"/>
  </g>

  <!-- Manomètre flottant -->
  <g transform="translate(300,110)">
    <circle r="30" fill="#162d52" stroke="#60A5FA" stroke-width="3"/>
    <path d="M0 0l12-10" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
    <circle r="4" fill="#60A5FA"/>
  </g>
</svg>
