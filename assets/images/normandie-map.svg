<svg width="480" height="380" viewBox="0 0 480 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Carte de la Normandie et zones d'intervention">
  <defs>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A3A6B"/>
      <stop offset="1" stop-color="#0D1F3C"/>
    </linearGradient>
  </defs>
  <!-- Silhouette stylisée de la Normandie -->
  <path d="M70 150 C90 110 140 90 190 92 C230 70 290 72 330 100 C380 105 420 130 430 175 C440 210 410 235 380 250 C360 290 300 305 250 300 C200 320 140 312 110 280 C75 270 55 230 60 195 C58 175 60 160 70 150 Z"
        fill="url(#land)" stroke="#2563EB" stroke-width="2.5" opacity="0.97"/>
  <!-- Texture intérieure -->
  <path d="M70 150 C90 110 140 90 190 92 C230 70 290 72 330 100 C380 105 420 130 430 175 C440 210 410 235 380 250 C360 290 300 305 250 300 C200 320 140 312 110 280 C75 270 55 230 60 195 C58 175 60 160 70 150 Z"
        fill="#ffffff" opacity="0.03"/>

  <!-- Points villes -->
  <g>
    <!-- Caen (capitale, plus gros) -->
    <circle cx="210" cy="175" r="9" fill="#2563EB"/>
    <circle cx="210" cy="175" r="16" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.5"/>
    <text x="210" y="158" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="14" fill="#ffffff">Caen</text>

    <!-- Autres villes -->
    <g fill="#60A5FA">
      <circle cx="330" cy="135" r="5"/>
      <circle cx="295" cy="110" r="5"/>
      <circle cx="135" cy="155" r="5"/>
      <circle cx="160" cy="120" r="5"/>
      <circle cx="260" cy="240" r="5"/>
      <circle cx="180" cy="250" r="5"/>
      <circle cx="350" cy="200" r="5"/>
      <circle cx="120" cy="220" r="5"/>
    </g>
    <g font-family="'Inter',sans-serif" font-size="11" fill="rgba(255,255,255,0.85)" font-weight="500">
      <text x="342" y="132">Rouen</text>
      <text x="270" y="100">Le Havre</text>
      <text x="92" y="150">Cherbourg</text>
      <text x="140" y="110">Coutances</text>
      <text x="272" y="258">Lisieux</text>
      <text x="150" y="270">Flers</text>
      <text x="362" y="204">Évreux</text>
      <text x="80" y="238">Avranches</text>
    </g>
  </g>

  <!-- Lignes de liaison (réseau) -->
  <g stroke="#2563EB" stroke-width="1.2" opacity="0.4" stroke-dasharray="4 4">
    <path d="M210 175L330 135M210 175L135 155M210 175L260 240M210 175L350 200"/>
  </g>
</svg>
