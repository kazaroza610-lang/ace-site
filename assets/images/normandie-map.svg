  <circle cx="259" cy="206" r="5.5" fill="none" stroke="#60A5FA" stroke-width="1"   class="pr2"/>
  <circle cx="259" cy="206" r="5.5" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.5" class="cd"/>
