<svg viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zones d'intervention — Normandie">
<defs>
  <linearGradient id="landGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0F2A5E"/>
    <stop offset="100%" stop-color="#071A3E"/>
  </linearGradient>
  <radialGradient id="centerGlow" cx="42%" cy="46%" r="42%">
    <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#071428" stop-opacity="0"/>
  </radialGradient>
  <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<style>
  @keyframes pRing {
    0%   { transform: scale(1);   opacity: .75; }
    100% { transform: scale(3.6); opacity: 0;   }
  }
  @keyframes dAppear {
    0%   { opacity: 0; transform: scale(0); }
    65%  { opacity: 1; transform: scale(1.25); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes lAppear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes lineIn {
    from { stroke-dashoffset: 350; opacity: 0; }
    25%  { opacity: .3; }
    to   { stroke-dashoffset: 0; opacity: .22; }
  }

  .pr  { transform-box: fill-box; transform-origin: center; animation: pRing 2.4s ease-out infinite; }
  .pr2 { transform-box: fill-box; transform-origin: center; animation: pRing 2.4s ease-out 1.2s infinite; }
  .cd  { transform-box: fill-box; transform-origin: center; animation: dAppear .55s cubic-bezier(.34,1.56,.64,1) both; }
  .cl  { animation: lAppear .5s ease both; }
  .ln  { animation: lineIn 1.4s ease both; stroke-dasharray: 5 5; }

  .d0  { animation-delay: .2s; }
  .d1  { animation-delay: .55s; }
  .d2  { animation-delay: .85s; }
  .d3  { animation-delay: 1.1s; }
  .d4  { animation-delay: 1.4s; }
  .d5  { animation-delay: 1.65s; }
  .d6  { animation-delay: 1.9s; }
  .d7  { animation-delay: 2.15s; }
  .d8  { animation-delay: 2.4s; }
  .d9  { animation-delay: 2.65s; }
  .d10 { animation-delay: 2.9s; }
  .d11 { animation-delay: 3.15s; }
  .d12 { animation-delay: 3.4s; }
  .d13 { animation-delay: 3.65s; }
</style>

<!-- Background -->
<rect width="500" height="380" fill="#071428"/>

<!-- Ambient glow -->
<ellipse cx="230" cy="188" rx="205" ry="150" fill="url(#centerGlow)"/>

<!--
  Silhouette Normandie (avec péninsule Cotentin au nord)
  Cotentin pointe vers le nord : la pointe monte jusqu'à y≈35
  Tracé horaire depuis coin SO vers le nord (côte ouest Cotentin),
  sur la pointe, redescend côte est, puis corps principal vers l'est
-->
<path d="
  M 38 198
  C 37 182 38 166 40 152
  C 42 136 43 118 45 104
  C 47 90  51 75  57 63
  C 61 53  65 43  68 35
  C 72 27  78 23  84 31
  C 90 40  97 52 106 63
  C 116 72 130 79 152 81
  C 170 79 190 74 212 73
  C 232 72 250 75 266 83
  C 276 88 284 91 293 88
  C 308 82 328 76 352 72
  C 370 70 388 73 408 80
  C 426 87 444 100 450 120
  C 456 140 454 162 448 180
  C 442 198 430 212 418 224
  C 404 238 388 250 368 262
  C 348 274 326 284 302 292
  C 280 300 258 306 235 308
  C 212 310 188 308 165 304
  C 144 300 126 294 110 283
  C 94  270  82 256  76 244
  C 68  230  56 214  48 206
  C 42  201  38 200  38 198
  Z"
  fill="url(#landGrad)" stroke="#2563EB" stroke-width="2.2"/>

<!-- Subtle inner highlight -->
<path d="
  M 38 198 C 37 182 38 166 40 152 C 42 136 43 118 45 104
  C 47 90 51 75 57 63 C 61 53 65 43 68 35 C 72 27 78 23 84 31
  C 90 40 97 52 106 63 C 116 72 130 79 152 81 C 170 79 190 74 212 73
  C 232 72 250 75 266 83 C 276 88 284 91 293 88 C 308 82 328 76 352 72
  C 370 70 388 73 408 80 C 426 87 444 100 450 120 C 456 140 454 162 448 180
  C 442 198 430 212 418 224 C 404 238 388 250 368 262 C 348 274 326 284 302 292
  C 280 300 258 306 235 308 C 212 310 188 308 165 304 C 144 300 126 294 110 283
  C 94 270 82 256 76 244 C 68 230 56 214 48 206 C 42 201 38 200 38 198 Z"
  fill="none" stroke="white" stroke-width="1" opacity=".05"/>

<!-- ─── LIGNES DE LIAISON depuis Caen (210,170) ─── -->
<g fill="none" stroke="#60A5FA" stroke-width="1">
  <line x1="210" y1="170" x2="68"  y2="68"  class="ln d1"/>
  <line x1="210" y1="170" x2="385" y2="112" class="ln d2"/>
  <line x1="210" y1="170" x2="266" y2="90"  class="ln d3"/>
  <line x1="210" y1="170" x2="400" y2="196" class="ln d4"/>
  <line x1="210" y1="170" x2="90"  y2="258" class="ln d5"/>
  <line x1="210" y1="170" x2="125" y2="180" class="ln d6"/>
  <line x1="210" y1="170" x2="265" y2="292" class="ln d13"/>
</g>

<!-- ══════════════════════════════════════
     VILLES
     Chaque ville : 2 anneaux pulse + dot + label
     ══════════════════════════════════════ -->

<!-- ★ Caen — ville principale -->
<g class="d0" filter="url(#dotGlow)">
  <circle cx="210" cy="170" r="9" fill="none" stroke="#93C5FD" stroke-width="1.5" class="pr"/>
  <circle cx="210" cy="170" r="9" fill="none" stroke="#93C5FD" stroke-width="1"   class="pr2"/>
  <circle cx="210" cy="170" r="9" fill="#1E40AF" stroke="#BFDBFE" stroke-width="2.5" class="cd"/>
</g>
<text x="210" y="154" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
      font-weight="700" font-size="13.5" fill="#FFFFFF" class="cl d0">Caen</text>

<!-- Rouen -->
<g class="d1">
