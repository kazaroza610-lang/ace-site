  <circle cx="385" cy="112" r="6" fill="none" stroke="#60A5FA" stroke-width="1"   class="pr2"/>
  <circle cx="385" cy="112" r="6" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.8" class="cd"/>
