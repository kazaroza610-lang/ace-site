  <circle cx="239" cy="152" r="9"   fill="none" stroke="#93C5FD" stroke-width="1"   class="pr2"/>
  <circle cx="239" cy="152" r="9"   fill="#1E40AF" stroke="#BFDBFE" stroke-width="2.5" class="cd"/>
</g>
<text x="239" y="136" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
      font-weight="700" font-size="13.5" fill="#fff" class="cl d0">Caen</text>

<!-- Rouen d1 -->
<g class="d1">
  <circle cx="423" cy="101" r="6" fill="none" stroke="#60A5FA" stroke-width="1.5" class="pr"/>
  <circle cx="423" cy="101" r="6" fill="none" stroke="#60A5FA" stroke-width="1"   class="pr2"/>
  <circle cx="423" cy="101" r="6" fill="#1D4ED8" stroke="#93C5FD" stroke-width="1.8" class="cd"/>
