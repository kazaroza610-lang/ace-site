<svg viewBox="0 0 530 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zone d'intervention — Normandie">
<defs>
  <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#0F2A5E"/>
    <stop offset="100%" stop-color="#071A3E"/>
  </linearGradient>
  <radialGradient id="cg" cx="44%" cy="44%" r="45%">
    <stop offset="0%" stop-color="#1D4ED8" stop-opacity=".22"/>
    <stop offset="100%" stop-color="#071428" stop-opacity="0"/>
  </radialGradient>
  <filter id="dg" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<style>
  @keyframes pR  { 0% { transform:scale(1);   opacity:.75 } 100% { transform:scale(3.5); opacity:0 } }
  @keyframes dA  { 0% { opacity:0; transform:scale(0) } 65% { opacity:1; transform:scale(1.22) } 100% { opacity:1; transform:scale(1) } }
  @keyframes lA  { from { opacity:0 } to { opacity:1 } }
  @keyframes lnI { from { stroke-dashoffset:350; opacity:0 } 30% { opacity:.25 } to { stroke-dashoffset:0; opacity:.2 } }
  .pr  { transform-box:fill-box; transform-origin:center; animation:pR 2.4s ease-out infinite }
  .pr2 { transform-box:fill-box; transform-origin:center; animation:pR 2.4s ease-out 1.2s infinite }
  .cd  { transform-box:fill-box; transform-origin:center; animation:dA .5s cubic-bezier(.34,1.56,.64,1) both }
  .cl  { animation:lA .5s ease both }
  .ln  { animation:lnI 1.4s ease both; stroke-dasharray:5 5 }
  .d0  { animation-delay:.2s }  .d1  { animation-delay:.5s }  .d2  { animation-delay:.8s }
  .d3  { animation-delay:1.1s } .d4  { animation-delay:1.35s } .d5  { animation-delay:1.6s }
  .d6  { animation-delay:1.85s } .d7  { animation-delay:2.1s } .d8  { animation-delay:2.35s }
  .d9  { animation-delay:2.6s } .d10 { animation-delay:2.85s } .d11 { animation-delay:3.1s }
  .d12 { animation-delay:3.35s } .d13 { animation-delay:3.6s }
</style>

<rect width="530" height="380" fill="#071428"/>
<ellipse cx="245" cy="188" rx="215" ry="155" fill="url(#cg)"/>

<!--
  Contour réel de la Normandie (tracé horaire depuis Cap de la Hague)
  Péninsule du Cotentin, côte Calvados, Haute-Normandie, frontières sud
  Coordonnées: x=20+(lon+2.10)*126  y=20+(49.85-lat)*194
-->
<path d="
  M 41 43
  C 55 36 68 34 80 46
  C 92 46 110 48 126 52
  C 128 64 130 80 130 95
  C 130 110 130 120 130 128
  C 138 116 147 111 155 112
  C 170 120 183 128 196 132
  C 218 131 237 130 253 131
  C 268 128 283 118 296 115
  C 305 108 310 104 314 103
  C 308 96 302 90 299 90
  C 302 76 307 62 311 50
  C 318 42 326 38 336 36
  C 358 28 390 22 420 22
  C 440 22 452 22 462 26
  C 474 34 488 52 496 72
  C 500 90 502 100 500 108
  C 498 122 494 134 488 145
  C 482 158 475 168 472 178
  C 466 192 454 204 448 216
  C 440 228 434 240 428 250
  C 416 262 402 272 386 280
  C 368 287 348 290 328 292
  C 312 294 300 296 296 295
  C 284 310 268 315 248 313
  C 228 313 210 311 194 311
  C 178 312 162 304 148 293
  C 136 280 124 265 116 250
  C 108 238 94 226 82 218
  C 74 208 68 200 64 190
  C 58 178 54 162 52 148
  C 48 130 44 110 44 96
  C 42 78 40 60 41 43
  Z"
  fill="url(#lg)" stroke="#2563EB" stroke-width="2"/>

<!-- Reflet intérieur subtil -->
<path d="M 41 43 C 55 36 68 34 80 46 C 92 46 110 48 126 52 C 128 64 130 80 130 95
  C 130 110 130 120 130 128 C 138 116 147 111 155 112 C 170 120 183 128 196 132
  C 218 131 237 130 253 131 C 268 128 283 118 296 115 C 305 108 310 104 314 103
  C 308 96 302 90 299 90 C 302 76 307 62 311 50 C 318 42 326 38 336 36
  C 358 28 390 22 420 22 C 440 22 452 22 462 26 C 474 34 488 52 496 72
  C 500 90 502 100 500 108 C 498 122 494 134 488 145 C 482 158 475 168 472 178
  C 466 192 454 204 448 216 C 440 228 434 240 428 250 C 416 262 402 272 386 280
  C 368 287 348 290 328 292 C 312 294 300 296 296 295 C 284 310 268 315 248 313
  C 228 313 210 311 194 311 C 178 312 162 304 148 293 C 136 280 124 265 116 250
  C 108 238 94 226 82 218 C 74 208 68 200 64 190 C 58 178 54 162 52 148
  C 48 130 44 110 44 96 C 42 78 40 60 41 43 Z"
  fill="none" stroke="white" stroke-width="1" opacity=".06"/>

<!-- ─── Lignes de liaison depuis Caen (239, 152) ─── -->
<g fill="none" stroke="#60A5FA" stroke-width="1">
  <line x1="239" y1="152" x2="80"  y2="63"  class="ln d1"/>
  <line x1="239" y1="152" x2="423" y2="101" class="ln d2"/>
  <line x1="239" y1="152" x2="300" y2="94"  class="ln d3"/>
  <line x1="239" y1="152" x2="425" y2="183" class="ln d4"/>
  <line x1="239" y1="152" x2="114" y2="249" class="ln d5"/>
  <line x1="239" y1="152" x2="147" y2="163" class="ln d6"/>
  <line x1="239" y1="152" x2="290" y2="291" class="ln d13"/>
</g>

<!-- ══════════ VILLES ══════════ -->

<!-- ★ Caen — capitale d0 -->
<g class="d0" filter="url(#dg)">
