<svg width="640" height="520" viewBox="0 0 640 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L'activité d'Air Comprimé Normandie : SAV, maintenance, vente, location et réseaux d'air comprimé en Normandie">
  <defs>
    <linearGradient id="ba-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A3A6B"/>
      <stop offset="1" stop-color="#0D1F3C"/>
    </linearGradient>
    <linearGradient id="ba-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ba-steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8EDF4"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd6e3"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="640" height="520" rx="16" fill="url(#ba-bg)"/>

  <!-- Silhouette Normandie en filigrane -->
  <path d="M70 360 C90 330 150 320 200 326 C240 312 300 314 340 332 C390 336 430 350 440 380 C448 405 420 425 392 432 C372 458 320 466 280 460 C236 472 180 466 150 448 C112 442 96 418 100 392 C98 378 100 368 70 360 Z"
        fill="#ffffff" opacity="0.04"/>

  <!-- Grille industrielle -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <path d="M0 130h640M0 260h640M0 390h640M160 0v520M320 0v520M480 0v520"/>
  </g>

  <!-- ════ Réseau d'air comprimé (tuyauterie reliant les pôles) ════ -->
  <g stroke="#E8EDF4" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M150 150h170a24 24 0 0 1 24 24v40"/>
    <path d="M150 150v120"/>
    <path d="M344 320v40a24 24 0 0 0 24 24h120"/>
  </g>
  <g fill="#2563EB">
    <circle cx="150" cy="150" r="10"/>
    <circle cx="344" cy="214" r="10"/>
    <circle cx="344" cy="320" r="10"/>
    <circle cx="488" cy="384" r="10"/>
  </g>

  <!-- ════ Compresseur principal (vente / SAV) ════ -->
  <g transform="translate(380,120)">
    <!-- réservoir -->
    <rect x="0" y="20" width="70" height="150" rx="14" fill="url(#ba-steel)" stroke="#b6c2d4" stroke-width="2"/>
    <ellipse cx="35" cy="20" rx="35" ry="12" fill="#ffffff" stroke="#b6c2d4" stroke-width="2"/>
    <circle cx="35" cy="44" r="12" fill="#0D1F3C"/>
    <path d="M35 44l5-4" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
    <!-- bloc compresseur -->
    <rect x="78" y="60" width="130" height="100" rx="12" fill="url(#ba-body)"/>
    <rect x="78" y="60" width="130" height="26" rx="12" fill="#ffffff" opacity="0.12"/>
    <rect x="92" y="78" width="46" height="36" rx="5" fill="#0D1F3C"/>
    <circle cx="104" cy="92" r="4.5" fill="#52d869"/>
    <circle cx="120" cy="92" r="4.5" fill="#60A5FA"/>
    <g stroke="#0D1F3C" stroke-width="3" stroke-linecap="round" opacity="0.5">
      <path d="M156 74v74M170 74v74M184 74v74"/>
    </g>
    <rect x="92" y="160" width="14" height="18" rx="3" fill="#4A5568"/>
    <rect x="180" y="160" width="14" height="18" rx="3" fill="#4A5568"/>
  </g>

  <!-- ════ Maintenance (engrenage + clé) ════ -->
  <g transform="translate(150,150)">
    <circle r="46" fill="#162d52" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <g fill="#E8EDF4">
      <rect x="-6" y="-40" width="12" height="13" rx="2"/>
      <rect x="-6" y="27" width="12" height="13" rx="2"/>
      <rect x="-40" y="-6" width="13" height="12" rx="2"/>
      <rect x="27" y="-6" width="13" height="12" rx="2"/>
    </g>
    <g fill="#E8EDF4" transform="rotate(45)">
      <rect x="-6" y="-40" width="12" height="13" rx="2"/>
      <rect x="-6" y="27" width="12" height="13" rx="2"/>
      <rect x="-40" y="-6" width="13" height="12" rx="2"/>
      <rect x="27" y="-6" width="13" height="12" rx="2"/>
    </g>
    <circle r="22" fill="#2563EB"/>
    <circle r="9" fill="#0D1F3C"/>
  </g>

  <!-- ════ Technicien (silhouette) ════ -->
  <g transform="translate(110,300)">
    <!-- casque -->
    <circle cx="0" cy="0" r="20" fill="#60A5FA"/>
    <path d="M-22 -2a22 14 0 0 1 44 0z" fill="#2563EB"/>
    <!-- corps -->
    <path d="M-26 80c0-30 12-52 26-52s26 22 26 52z" fill="#E8EDF4"/>
    <rect x="-10" y="34" width="20" height="20" fill="#E8EDF4"/>
    <!-- bras tenant un outil -->
    <path d="M22 44l26 16" stroke="#E8EDF4" stroke-width="10" stroke-linecap="round"/>
    <rect x="46" y="52" width="10" height="26" rx="3" fill="#4A5568" transform="rotate(30 51 65)"/>
  </g>

  <!-- ════ Location (camion) ════ -->
  <g transform="translate(420,330)">
    <rect x="0" y="0" width="62" height="36" rx="5" fill="#1A3A6B" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <path d="M62 10h18l14 14v12H62z" fill="#162d52" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="68" y="14" width="14" height="12" rx="2" fill="#0D1F3C"/>
    <circle cx="18" cy="40" r="8" fill="#0D1F3C" stroke="#2563EB" stroke-width="3"/>
    <circle cx="80" cy="40" r="8" fill="#0D1F3C" stroke="#2563EB" stroke-width="3"/>
  </g>

  <!-- ════ Badge "Toutes marques" ════ -->
  <g transform="translate(40,40)">
    <rect width="170" height="58" rx="12" fill="#ffffff"/>
    <circle cx="33" cy="29" r="16" fill="#2563EB"/>
    <path d="M27 29l4 4 8-9" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="58" y="25" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="17" fill="#0D1F3C">TOUTES</text>
    <text x="58" y="45" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="17" fill="#2563EB">MARQUES</text>
  </g>

  <!-- ════ Badge "22+ ans" ════ -->
  <g transform="translate(470,40)">
    <rect width="130" height="58" rx="12" fill="#2563EB"/>
    <text x="20" y="36" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="26" fill="#ffffff">22+</text>
    <text x="64" y="26" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#ffffff">ans</text>
    <text x="64" y="42" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="rgba(255,255,255,0.9)">d'expérience</text>
  </g>

  <!-- ════ Bandeau légende bas ════ -->
  <g transform="translate(0,470)">
    <rect width="640" height="50" fill="#080F1E" opacity="0.55"/>
    <text x="320" y="31" text-anchor="middle" font-family="'Inter',sans-serif" font-weight="600" font-size="14" letter-spacing="0.5" fill="#ffffff">SAV · Maintenance · Vente · Location · Réseaux — toute la Normandie</text>
  </g>
</svg>
