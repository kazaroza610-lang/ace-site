<svg width="560" height="460" viewBox="0 0 560 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Compresseur d'air industriel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A3A6B"/>
      <stop offset="1" stop-color="#0D1F3C"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8EDF4"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd6e3"/>
    </linearGradient>
  </defs>

  <!-- Fond arrondi -->
  <rect width="560" height="460" rx="16" fill="url(#bg)"/>

  <!-- Grille décorative -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <path d="M0 115h560M0 230h560M0 345h560M140 0v460M280 0v460M420 0v460"/>
  </g>

  <!-- Réservoir cylindrique (cuve d'air) -->
  <rect x="86" y="150" width="120" height="230" rx="20" fill="url(#steel)" stroke="#b6c2d4" stroke-width="2"/>
  <ellipse cx="146" cy="150" rx="60" ry="20" fill="#ffffff" stroke="#b6c2d4" stroke-width="2"/>
  <rect x="86" y="220" width="120" height="6" fill="#cdd6e3"/>
  <rect x="86" y="300" width="120" height="6" fill="#cdd6e3"/>
  <!-- Manomètre -->
  <circle cx="146" cy="185" r="20" fill="#0D1F3C"/>
  <circle cx="146" cy="185" r="15" fill="#162d52" stroke="#60A5FA" stroke-width="2"/>
  <path d="M146 185l8-7" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tuyau de liaison -->
  <path d="M206 250h60" stroke="#4A5568" stroke-width="10" stroke-linecap="round"/>
  <circle cx="236" cy="250" r="9" fill="#2563EB"/>

  <!-- Bloc compresseur (corps orange) -->
  <rect x="266" y="190" width="200" height="150" rx="14" fill="url(#body)"/>
  <rect x="266" y="190" width="200" height="40" rx="14" fill="#ffffff" opacity="0.12"/>
  <!-- Panneau de contrôle -->
  <rect x="288" y="212" width="70" height="50" rx="6" fill="#0D1F3C"/>
  <circle cx="306" cy="232" r="6" fill="#52d869"/>
  <circle cx="326" cy="232" r="6" fill="#60A5FA"/>
  <rect x="296" y="246" width="44" height="6" rx="3" fill="#ffffff" opacity="0.5"/>
  <!-- Grille d'aération -->
  <g stroke="#0D1F3C" stroke-width="4" stroke-linecap="round" opacity="0.55">
    <path d="M388 215v100M408 215v100M428 215v100M448 215v100"/>
  </g>

  <!-- Pieds -->
  <rect x="296" y="340" width="18" height="26" rx="4" fill="#4A5568"/>
  <rect x="418" y="340" width="18" height="26" rx="4" fill="#4A5568"/>
  <rect x="106" y="380" width="22" height="22" rx="4" fill="#4A5568"/>
  <rect x="164" y="380" width="22" height="22" rx="4" fill="#4A5568"/>

  <!-- Sortie d'air comprimé (flux animé statique) -->
  <g stroke="#60A5FA" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <path d="M466 240h36"/>
    <path d="M466 260h26" opacity="0.7"/>
    <path d="M466 280h44" opacity="0.5"/>
  </g>

  <!-- Badge "Toutes marques" -->
  <g transform="translate(360,60)">
    <rect width="150" height="56" rx="12" fill="#ffffff"/>
    <text x="18" y="26" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="20" fill="#0D1F3C">TOUTES</text>
    <text x="18" y="46" font-family="'Barlow Condensed',sans-serif" font-weight="800" font-size="20" fill="#2563EB">MARQUES</text>
  </g>
</svg>
